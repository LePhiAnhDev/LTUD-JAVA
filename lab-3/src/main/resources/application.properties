spring.application.name=Lab3-SpringBoot

app.notification.channel=email
app.notification.from=no-reply@lab.com
app.notification.max-retries=3
app.notification.enabled=true

# Buoc 4 - Spring Profiles.
# Spring Boot load application.properties truoc, sau do application-{profile}.properties
# ghi de cac key trung nhau. Doi 'dev' -> 'prod' de dung application-prod.properties,
# hoac chay: mvn spring-boot:run -Dspring-boot.run.profiles=prod
spring.profiles.active=dev
